name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
      continue-on-error: false
    
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
      continue-on-error: true  # Don't fail the whole job on lint errors
    
    - name: Type check with mypy
      run: mypy src/
      continue-on-error: true  # Don't fail on type errors initially
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --asyncio-mode=auto
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'  # Only upload once
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        echo "Installing package with dev dependencies..."
        pip install -e ".[dev]" || (echo "Installation failed! Checking what went wrong..." && pip list && exit 1)

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install mcp separately if it's from a git repo
        pip install git+https://github.com/modelcontextprotocol/python-sdk.git
        pip install -e ".[dev]"