name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install uv
      run: pip install uv
    
    - name: Install dependencies
      run: |
        uv pip install -e ".[dev]"
        uv pip install pytest pytest-asyncio pytest-cov
    
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
    
    - name: Type check with mypy
      run: mypy src/
    
    - name: Test with pytest
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=xml --asyncio-mode=auto
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        pip install uv
        uv pip install -e ".[dev]"
    
    - name: Test MCP server availability
      run: |
        python -c "
        import subprocess
        import time
        # Test that uvx can at least try to run the server
        try:
            result = subprocess.run(['uvx', '--version'], capture_output=True, text=True)
            print(f'UV version: {result.stdout}')
        except Exception as e:
            print(f'Error: {e}')
            exit(1)
        "